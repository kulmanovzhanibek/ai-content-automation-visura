name: Daily content

on:
  schedule:
    # 04:00 UTC = 09:00 Asia/Almaty (UTC+5 year-round, no DST)
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Chrome Headless Shell (used by Remotion to render) needs these shared libs.
      # https://www.remotion.dev/docs/miscellaneous/linux-dependencies
      - name: Install headless Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libexpat1 libdbus-1-3 libgbm1 libasound2t64 \
            libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libxkbcommon0 \
            libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 \
            libpango-1.0-0 libcairo2 fonts-liberation

      - name: npm ci
        run: npm ci

      - name: Run daily content pipeline
        uses: anthropics/claude-code-action@v1
        env:
          # Pipeline credentials (Vertex image gen + GCS upload for IG hosting).
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          # ElevenLabs voice.
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          # Telegram delivery.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Instagram publishing.
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep"
            --max-turns 200
          prompt: |
            DAILY CONTENT RUN (automated, GitHub Actions).

            Follow the "Daily automation (cron / routine)" section in CLAUDE.md
            exactly, end to end: pick today's room by the day-of-month rule there,
            then run STYLE -> COLOR -> SLIDES -> KLING MORPH gate, IN THAT ORDER,
            each one fully finished (render + Telegram + Instagram, per that section)
            before starting the next.

            Reminders (also in CLAUDE.md, repeated because they're easy to miss):
            - Bilingual EN + RU for every deliverable, generate images/clips once
              and reuse them for both language cuts (0 extra generation cost).
            - Every video ends with the assets/app.mp4 outro.
            - Instagram gets ONLY the RU cut of each of the 3 auto formats
              (2 Reels: STYLE + COLOR, 1 carousel: SLIDES) via src/instagram.ts,
              to the single configured IG_USER_ID account. Never post the EN cut.
            - Halal content only; hooks under 8 words; no double text layers.
            - KLING MORPH (format 4): generate ONLY the base photo + idea frames,
              send them to Telegram and stop. Do NOT attempt any Kling MCP call —
              this runner has no Kling connector and cannot place that call at all,
              approved or not. The Kling render always happens later in an
              interactive Claude Code session where a human replies "go"; note
              that clearly in your final summary message to Telegram.
            - If one item's quota is exhausted or a service is down, skip THAT
              item with a one-line Telegram status and continue with the rest —
              never fail the whole run over one item.

            End with a short summary message to Telegram: formats x languages
            produced, Instagram posts made, anything skipped and why, and that
            format 4 is waiting for a human "go" in an interactive session.
